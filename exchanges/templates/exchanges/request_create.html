{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-center mb-4">Request Exchange</h3>

                <p><strong>You want to learn:</strong> {{ receiver_skill.name }}</p>
                <p><strong>From:</strong> {{ receiver_skill.user.username }}</p>
                <p>{{ receiver_skill.description }}</p>

                <hr>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Choose a skill you can offer:</label>
                        <select name="sender_skill" class="form-control" required>
                            <option value="">Select your skill</option>
                            {% for skill in sender_skills %}
                                <option value="{{ skill.id }}">{{ skill.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Send Request</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
